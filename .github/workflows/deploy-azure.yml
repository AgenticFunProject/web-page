name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: rg-web-page-gateway
  AZURE_CONTAINER_APP_NAME: gateway
  AZURE_CONTAINER_REGISTRY: acrgwdev01
  AZURE_CONTAINER_IMAGE_NAME: gateway

jobs:
  deploy:
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check whether infrastructure exists
        id: preflight
        shell: bash
        run: |
          if az containerapp show \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_CONTAINER_APP_NAME" >/dev/null 2>&1 \
            && az acr show --name "$AZURE_CONTAINER_REGISTRY" >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Azure infrastructure has not been provisioned yet; skipping deployment." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build container image in ACR
        if: steps.preflight.outputs.ready == 'true'
        run: |
          az acr build \
            --registry "$AZURE_CONTAINER_REGISTRY" \
            --image "$AZURE_CONTAINER_IMAGE_NAME:${GITHUB_SHA}" \
            --image "$AZURE_CONTAINER_IMAGE_NAME:latest" \
            .

      - name: Deploy new image to Container App
        if: steps.preflight.outputs.ready == 'true'
        run: |
          az containerapp update \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$AZURE_CONTAINER_REGISTRY.azurecr.io/$AZURE_CONTAINER_IMAGE_NAME:${GITHUB_SHA}" \
            --output none

      - name: Publish deployment summary
        if: steps.preflight.outputs.ready == 'true'
        run: |
          fqdn="$(az containerapp show \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)"
          {
            echo "## Azure deploy complete"
            echo ""
            echo "- Container App: \`${AZURE_CONTAINER_APP_NAME}\`"
            echo "- Image: \`${AZURE_CONTAINER_REGISTRY}.azurecr.io/${AZURE_CONTAINER_IMAGE_NAME}:${GITHUB_SHA}\`"
            echo "- URL: https://${fqdn}"
          } >> "$GITHUB_STEP_SUMMARY"
